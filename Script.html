<script>

  function saveState() {
    sessionStorage.setItem("ipaState", JSON.stringify({
      school: state.currentSchool,
      lab: state.currentLab?.sheetId
    }));
  }

  function restoreState() {
    const saved = JSON.parse(sessionStorage.getItem("ipaState") || "{}");

    if (saved.lab) {
      const lab = state.labs.find(l => l.sheetId === saved.lab);
      if (lab) {
        state.currentLab = lab;
        state.currentSchool = lab.school;
        renderSettings(lab);
        return true;
      }
    }

    if (saved.school) {
      state.currentSchool = saved.school;
      renderLabs();
      return true;
    }

    return false;
  }

  /* ================= STATE ================= */
  let state = {
    user: null,
    labs: [],
    currentSchool: null,
    currentLab: null
  };

  function getEmailFromURL() {
    const direct = new URLSearchParams(window.location.search).get("email");
    if (direct) return direct;

    const hashIndex = window.location.href.indexOf("?");
    if (hashIndex !== -1) {
      const fallbackParams = new URLSearchParams(window.location.href.slice(hashIndex));
      return fallbackParams.get("email") || "";
    }

    return "";
  }

  function normalizeEmail(email) {
    return String(email || "").trim().toLowerCase();
  }

  let currentEmail = normalizeEmail(
    window.__INITIAL_EMAIL__ ||
    sessionStorage.getItem("ipaCurrentEmail") ||
    getEmailFromURL()
  );
  let currentAuthToken = window.__AUTH_TOKEN__ || sessionStorage.getItem("ipaAuthToken") || "";

  function resolveClientEmail(callback) {
    if (currentEmail) {
      sessionStorage.setItem("ipaCurrentEmail", currentEmail);
      if (currentAuthToken) {
        sessionStorage.setItem("ipaAuthToken", currentAuthToken);
      }
      callback();
      return;
    }

    if (!google.script.url || !google.script.url.getLocation) {
      callback();
      return;
    }

    google.script.url.getLocation(location => {
      const locationEmail = location && location.parameter ? location.parameter.email : "";
      currentEmail = normalizeEmail(currentEmail || locationEmail);
      if (currentEmail) {
        sessionStorage.setItem("ipaCurrentEmail", currentEmail);
      }
      if (currentAuthToken) {
        sessionStorage.setItem("ipaAuthToken", currentAuthToken);
      }
      callback();
    });
  }



  /* ================= COLORS ================= */
  const COLORS = {
    lock: "#e53935",
    unlock: "#1e88e5",
    open: "#43a047",
    exam: "#fb8c00",
    hellocode: "#8e24aa",
    none: "#9e9e9e",
    all: "#1e88e5",
    style: "#fbc02d"
  };

  /* ================= ELEMENTS ================= */
  const app = document.getElementById("app");
  const loader = document.getElementById("loader");
  const username = document.getElementById("username");
  const avatar = document.getElementById("avatar");
  const userMenu = document.getElementById("userMenu");
  const schoolsMenu = document.getElementById("schoolsMenu");
  const toastEl = document.getElementById("toast");

  /* ================= UI ================= */
  let loaderTimeout;

  function showLoader() {
    loaderTimeout = setTimeout(() => {
      loader.classList.remove("hidden");
    }, 200); // لا يظهر إلا إذا فعلاً في تأخير
  }

  function hideLoader() {
    clearTimeout(loaderTimeout);
    loader.classList.add("hidden");
  }

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.style.display = "block";
    setTimeout(() => toastEl.style.display = "none", 2000);
  }

  /* ================= USER ================= */
  function loadUser(callback) {
    google.script.run.withSuccessHandler(u => {

      state.user = u;
      currentEmail = currentEmail || u.email || "";
      if (currentEmail) {
        sessionStorage.setItem("ipaCurrentEmail", currentEmail);
      }
      if (currentAuthToken) {
        sessionStorage.setItem("ipaAuthToken", currentAuthToken);
      }

      if (!u || !u.name) {
        username.textContent = "غير معروف";
        avatar.textContent = "?";
        userMenu.innerHTML = `
        <div><b>غير معروف</b></div>
        <div style="color:#777">${currentEmail || "-"}</div>
      `;
        if (typeof callback === "function") callback();
        return;
      }

      username.textContent = u.name;
      avatar.textContent = u.name.charAt(0);
      userMenu.innerHTML = `
      <div><b>${u.name}</b></div>
      <div style="color:#777">${u.email}</div>
      <hr>
      <div>🏫 ${u.school === "ALL" ? "كل المدارس" : u.school}</div>
      <div>💻 ${u.labs === "ALL" ? "كل المختبرات" : u.labs}</div>
    `;

      if (typeof callback === "function") callback();

    }).getUserData(currentEmail, currentAuthToken);
  }

  /* ================= NAV ================= */
  function navigate(view) {
    if (view === "schools") renderSchools();
    if (view === "dashboard") renderDashboard();
  }

  function toggleMobileMenu(e) {
    e.stopPropagation();

    const menu = document.querySelector(".menu");

    if (menu.classList.contains("show")) {
      menu.classList.remove("show");
    } else {
      menu.classList.add("show");
    }
  }

  /* ================= USER MENU ================= */
  function toggleUserMenu(e) {
    e.stopPropagation();

    const menu = document.getElementById("userMenu");
    const rect = e.currentTarget.getBoundingClientRect();
    const isOpen = menu.classList.contains("show");

    if (isOpen) {
      menu.classList.remove("show");
      return;
    }

    menu.classList.add("show");

    const menuWidth = menu.offsetWidth;
    const viewportPadding = 10;
    const desiredLeft = rect.right - menuWidth;
    const clampedLeft = Math.max(
      viewportPadding,
      Math.min(desiredLeft, window.innerWidth - menuWidth - viewportPadding)
    );

    menu.style.top = (rect.bottom + 8) + "px";
    menu.style.left = clampedLeft + "px";
    menu.style.right = "auto";
  }

  /* ================= SCHOOLS MENU ================= */
  function toggleSchoolsMenu(e) {
    e.stopPropagation();
    schoolsMenu.classList.toggle("show");
  }

  function buildSchoolsMenu() {

    let html = "";

    const grouped = {};

    state.labs.forEach(l => {
      if (!grouped[l.school]) grouped[l.school] = [];
      grouped[l.school].push(l);
    });

    for (let school in grouped) {

      html += `<div class="school-group">`;
      html += `<div class="school-title">${school}</div>`;

      grouped[school].forEach(lab => {
        html += `
        <div class="lab-item" onclick="openLab('${lab.sheetId}')">
          ${lab.labName}
        </div>
      `;
      });

      html += `</div>`;
    }

    schoolsMenu.innerHTML = html;
  }

  /* ================= OPEN LAB ================= */
  function openLab(id) {
    const lab = state.labs.find(l => l.sheetId === id);

    state.currentLab = lab;
    state.currentSchool = lab.school;

    saveState();

    renderSettings(lab);
    schoolsMenu.classList.remove("active");
  }

  /* ================= SCHOOLS ================= */
  function renderSchools() {

    app.innerHTML = "";
    showLoader();

    setTimeout(() => {

      hideLoader();

      const grid = document.createElement("div");
      grid.className = "grid fade";

      const schools = [...new Set(state.labs.map(l => l.school))];

      schools.forEach(s => {

        const count = state.labs.filter(l => l.school === s).length;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
        <div class="card-icon"><i class="fa-solid fa-school"></i></div>
        <div class="card-title">${s}</div>
        <div class="card-sub">عدد المختبرات: ${count}</div>
      `;

        card.onclick = () => {
          state.currentSchool = s;
          renderLabs();
        };

        grid.appendChild(card);
      });

      app.appendChild(grid);

    }, 150);
  }

  /* ================= LABS ================= */
  async function renderLabs() {
    saveState();
    showLoader();

    const labs = state.labs.filter(l => l.school === state.currentSchool);

// 🔥 grouping
const grouped = {};

labs.forEach(l => {
  if (!grouped[l.labName]) {
    grouped[l.labName] = {};
  }
  grouped[l.labName][l.type] = l;
});

    let allSettings = [];

    try {
      allSettings = await Promise.all(
        labs.map(l => new Promise(res => {
          google.script.run.withSuccessHandler(res)
            .getLabSettings(l.sheetId, currentEmail, currentAuthToken)
        }))
      );
    } catch (e) {
      console.error(e);
    }

    hideLoader();

    app.innerHTML = `
    <div class="breadcrumb">
      <span onclick="navigate('schools')">الرئيسية</span>
      <span>${state.currentSchool}</span>
    </div>
  `;

    const grid = document.createElement("div");
    grid.className = "grid fade";

    Object.keys(grouped).forEach(name => {

  const group = grouped[name];

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <div class="card-icon"><i class="fa-solid fa-desktop"></i></div>
    <div class="card-title">${name}</div>

    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center">

      ${group.STUDENT ? `<button onclick="openLab('${group.STUDENT.sheetId}')">👨‍🎓 Students</button>` : ""}

      ${group.TEACHER ? `<button onclick="openLab('${group.TEACHER.sheetId}')">👨‍🏫 Teacher</button>` : ""}

    </div>
  `;

  grid.appendChild(card);
});

    app.appendChild(grid);
  }

  /* ================= SETTINGS ================= */
  function renderSettings(lab) {

    showLoader();

    google.script.run.withSuccessHandler(settings => {

      hideLoader();

      app.innerHTML = `
      <div class="breadcrumb">
        <span onclick="navigate('schools')">الرئيسية</span>
        <span onclick="renderLabs()">${state.currentSchool}</span>
        <span>${lab.labName}</span>
      </div>
    `;

      const container = document.createElement("div");
      container.className = "settings fade";

      settings.forEach(s => {

        const div = document.createElement("div");
        div.className = "setting";

        let input;

        if (s.options.length) {
          input = document.createElement("select");

          s.options.forEach(o => {
            const opt = document.createElement("option");
            opt.value = o;
            opt.textContent = o;
            if (o === s.value) opt.selected = true;
            input.appendChild(opt);
          });

        } else {
          input = document.createElement("input");
          input.value = s.value;
        }

        if (COLORS[s.value]) {
          div.style.borderLeft = "6px solid " + COLORS[s.value];
          div.style.background = COLORS[s.value] + "15";
        }

        input.onchange = () => {

          const newValue = input.value;

          // 🔥 تحديث فوري UI
          if (COLORS[newValue]) {
            div.style.borderLeft = "6px solid " + COLORS[newValue];
            div.style.background = COLORS[newValue] + "15";
          }

          // 🔄 إرسال للسيرفر
          google.script.run
            .withSuccessHandler(() => {
              toast("تم التحديث ✔");
            })
            .withFailureHandler(() => {
              toast("فشل التحديث ❌");

              // rollback (اختياري)
              input.value = s.value;
            })
            .updateSetting(lab.sheetId, s.setting, newValue, currentEmail, currentAuthToken);

          // تحديث القيمة محلياً
          s.value = newValue;
        };

        div.innerHTML = `<label>${s.setting}</label>`;
        div.appendChild(input);

        container.appendChild(div);
      });

      app.appendChild(container);

    }).getLabSettings(lab.sheetId, currentEmail, currentAuthToken)
  }

  /* ================= DASHBOARD ================= */
  async function renderDashboard() {

    showLoader();

    const labs = state.labs;

    const allSettings = await Promise.all(
      labs.map(l => new Promise(res => {
        google.script.run
          .withSuccessHandler(res)
          .withFailureHandler(() => res([])) // 🔥 يمنع التعليق
          .getLabSettings(l.sheetId, currentEmail, currentAuthToken);
      }))
    );

    hideLoader();

    app.innerHTML = `
  <div class="dashboard fade">

    <div class="dashboard-header">
      <h2>لوحة التحكم</h2>
      <p>نظرة عامة على حالة المختبرات</p>
    </div>

    <div class="dashboard-grid">
      <div class="stat-card">
        <i class="fa-solid fa-school"></i>
        <div>
          <div class="stat-title">عدد المدارس</div>
          <div class="stat-value" id="statSchools"></div>
        </div>
      </div>

      <div class="stat-card">
        <i class="fa-solid fa-desktop"></i>
        <div>
          <div class="stat-title">عدد المختبرات</div>
          <div class="stat-value" id="statLabs"></div>
        </div>
      </div>
    </div>

    <div class="mode-section">
      <h3>حالة المختبرات</h3>
      <div class="mode-grid" id="modeStats"></div>
    </div>

    <div style="margin-top:30px;">
      <div class="chart-card">
        <canvas id="chart" height="120"></canvas>
      </div>
    </div>

  </div>
`;

    const counts = {};

    allSettings.forEach(settings => {
      const mode = settings.find(s => s.setting === "Mode")?.value || "none";
      counts[mode] = (counts[mode] || 0) + 1;
    });

    // ===== STATS =====
    document.getElementById("statSchools").textContent =
      new Set(state.labs.map(l => l.school)).size;

    document.getElementById("statLabs").textContent =
      state.labs.length;

    // ===== MODE CARDS =====
    let html = "";

    for (let mode in counts) {
      html += `
      <div class="mode-card" style="background:${COLORS[mode] || "#999"}">
        ${mode} : ${counts[mode]}
      </div>
    `;
    }

    document.getElementById("modeStats").innerHTML = html;

    const labels = Object.keys(counts);
    const data = Object.values(counts);

    setTimeout(() => {

      const canvas = document.getElementById("chart");
      if (!canvas) {
        console.error("Chart canvas not found");
        return;
      }

      const ctx = canvas.getContext("2d");

      new Chart(ctx, {
        type: "bar",
        data: {
          labels: labels,
          datasets: [{
            label: "عدد المختبرات",
            data: data,
            backgroundColor: labels.map(l => COLORS[l] || "#999"),
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false }
          }
        }
      });
    }, 50);
  }

  /* ================= INIT ================= */
  function init() {

    showLoader();

    loadUser(() => {
      google.script.run
        .withSuccessHandler(labs => {

          state.labs = labs;

          hideLoader();

          if (!restoreState()) {
            renderSchools();
          }
          buildSchoolsMenu();
        })
        .withFailureHandler(err => {
          hideLoader();
          console.error(err);

          document.getElementById("app").innerHTML = `
          <div style="padding:30px;text-align:center;color:#e53935;">
            حدث خطأ أو لا تملك صلاحية الدخول
          </div>
        `;
        })
        .getLabs(currentEmail, currentAuthToken);
    });
  }

  resolveClientEmail(init);

  document.addEventListener("click", function (e) {
    const mobileMenu = document.querySelector(".menu");
    const menu = document.getElementById("userMenu");
    const user = document.querySelector(".user");

    if (mobileMenu && !mobileMenu.contains(e.target) && !e.target.closest(".hamburger")) {
      mobileMenu.classList.remove("show");
    }

    if (!menu || !user) return;

    if (!user.contains(e.target)) {
      menu.classList.remove("show");
    }
  });

</script>
