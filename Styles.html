<style>

/* ===== RESET & BASE ===== */
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background:#f5f7fb;
  color:#333;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

#app{
  flex:1;
}

/* ===== NAVBAR ===== */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 25px;
  background:white;
  border-bottom:1px solid #e6e9f0;
  position:sticky;
  top:0;
  z-index:100;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.nav-right{
  position:relative;
}

.logo{
  height:40px;
}

/* TITLE */
.app-title{
  display:flex;
  flex-direction:column;
  line-height:1.2;
}

.app-title .main{
  font-weight:700;
  color:#6f42c1;
  font-size:16px;
}

.app-title .sub{
  font-size:12px;
  color:#777;
}

/* MENU */
.menu{
  display:flex;
  gap:20px;
  margin-right:30px;
}

.menu-item{
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  color:#555;
  font-size:14px;
  transition:0.2s;
}

.menu-item:hover{
  color:#6f42c1;
}

/* ===== DROPDOWN ===== */
.dropdown-parent{
  position:relative;
}

.dropdown-menu{
  position:absolute;
  top:110%;
  right:0;
  background:white;
  border:1px solid #ddd;
  border-radius:12px;
  padding:12px;
  min-width:180px;
  max-width:260px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  display:none;
  z-index:999;
}

.dropdown-menu.show{
  display:block;
}

.user-menu{
  position:fixed;
  z-index:99999;
  width:240px;
  max-width:calc(100vw - 20px);
  overflow-wrap:anywhere;
  word-break:break-word;
}

/* ===== USER ===== */
.user{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  position:relative;
}

.avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  background:#6f42c1;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:20px;
  padding:25px;
  max-width:1100px;
  margin:auto;
}

/* ===== CARD ===== */
.card{
  background:white;
  border-radius:16px;
  padding:22px;
  cursor:pointer;
  transition:0.25s;
  border:1px solid #e6e9f0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:8px;
}

@media (max-width: 600px){
  .dropdown-menu{
    right:10px;
    left:10px;
    max-width:calc(100vw - 20px);
  }
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card-icon{
  font-size:28px;
  color:#6f42c1;
}

.card-title{
  font-size:17px;
  font-weight:600;
}

.card-sub{
  font-size:13px;
  color:#777;
}

/* ===== STATUS ===== */
.status{
  margin-top:10px;
  padding:6px 12px;
  border-radius:20px;
  color:white;
  font-size:12px;
}

/* ===== SETTINGS ===== */
.settings{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
  padding:25px;
  max-width:1100px;
  margin:auto;
}

.setting{
  background:white;
  border-radius:14px;
  padding:16px;
  border:1px solid #e4e7ee;
  display:flex;
  flex-direction:column;
  gap:10px;
  transition:0.2s;
}

.setting:hover{
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.setting label{
  font-size:13px;
  color:#666;
}

.setting select,
.setting input{
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
  font-family:'Cairo';
}

/* ===== BREADCRUMB ===== */
.breadcrumb{
  padding:15px 25px;
  font-size:14px;
}

.breadcrumb span{
  color:#6f42c1;
  cursor:pointer;
}

.breadcrumb span::after{
  content:"/";
  margin:0 5px;
  color:#aaa;
}

.breadcrumb span:last-child::after{
  content:"";
}

/* ===== LOADER ===== */
.loader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(4px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.loader.hidden{
  display:none;
}

.spinner{
  width:50px;
  height:50px;
  border:5px solid #ddd;
  border-top:5px solid #6f42c1;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* ===== TOAST ===== */
.toast{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#6f42c1;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  display:none;
}

/* ===== ANIMATION ===== */
.fade{
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}

/* ===== SCHOOLS MENU ===== */
.school-group{
  margin-bottom:8px;
}

.school-title{
  font-weight:600;
  margin-bottom:5px;
}

.lab-item{
  padding:6px;
  border-radius:6px;
  cursor:pointer;
}

.lab-item:hover{
  background:#f2f2f2;
}

/* ===== DASHBOARD ===== */
.dashboard{
  padding:25px;
}

.dashboard-header h2{
  margin:0;
}

.dashboard-header p{
  color:#777;
  margin-top:5px;
}

.dashboard-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
  gap:15px;
  margin-top:20px;
}

.stat-card{
  background:white;
  border-radius:14px;
  padding:18px;
  display:flex;
  align-items:center;
  gap:15px;
  border:1px solid #e6e9f0;
}

.stat-card i{
  font-size:22px;
  color:#6f42c1;
}

.stat-title{
  font-size:13px;
  color:#777;
}

.stat-value{
  font-size:20px;
  font-weight:700;
}

.mode-section{
  margin-top:30px;
}

.mode-section h3{
  margin-bottom:10px;
}

.mode-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
  gap:12px;
  margin-top:15px;
}

.mode-card{
  padding:14px;
  border-radius:12px;
  color:white;
  font-weight:bold;
  text-align:center;
  font-size:14px;
  transition:0.2s;
}

.mode-card:hover{
  transform:scale(1.05);
}

.chart-card{
  background:white;
  border-radius:16px;
  padding:20px;
  border:1px solid #e6e9f0;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* ===== FOOTER ===== */
.footer{
  margin-top:auto;
  padding:20px;
  background:linear-gradient(135deg,#6f42c1,#8e24aa);
  color:white;
}

.footer-content{
  display:flex;
  justify-content:space-between;
  align-items:center;
  max-width:1100px;
  margin:auto;
  font-size:13px;
}

.footer-center{
  font-weight:bold;
}

.footer-right i{
  font-size:18px;
}
/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .menu{
    display:none;
  }

  .footer-content{
    flex-direction:column;
    gap:5px;
    text-align:center;
  }
}

</style>
