<style>

/* ===== RESET & BASE ===== */
*{
  box-sizing:border-box;
}

html{
  height:100%;
  overflow-x:hidden;
  width:100%;
}

body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background:#f5f7fb;
  color:#333;
  min-height:100%;
  overflow-x:hidden;
  width:100%;
}

.page-shell{
  width:100%;
  max-width:100vw;
  min-height:100vh;
  min-height:100svh;
  display:block;
  overflow-x:hidden;
}

#app{
  width:100%;
  max-width:100%;
  display:block;
  min-width:0;
  padding-bottom:96px;
}

/* ===== NAVBAR ===== */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 25px;
  background:white;
  border-bottom:1px solid #e6e9f0;
  position:sticky;
  top:0;
  z-index:100;
  width:100%;
  max-width:100vw;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}

.nav-right{
  position:relative;
}

.logo{
  height:40px;
}

/* TITLE */
.app-title{
  display:flex;
  flex-direction:column;
  line-height:1.2;
}

.app-title .main{
  font-weight:700;
  color:#6f42c1;
  font-size:16px;
}

.app-title .sub{
  font-size:12px;
  color:#777;
}

/* MENU */
.menu{
  display:flex;
  gap:20px;
  margin-right:30px;
}

.menu-item{
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  color:#555;
  font-size:14px;
  transition:0.2s;
}

.menu-item:hover{
  color:#6f42c1;
}

.hamburger{
  display:none;
  font-size:22px;
  cursor:pointer;
}

/* ===== DROPDOWN ===== */
.dropdown-parent{
  position:relative;
}

.dropdown-menu{
  position:absolute;
  top:110%;
  right:0;
  background:white;
  border:1px solid #ddd;
  border-radius:12px;
  padding:12px;
  min-width:180px;
  max-width:260px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  display:none;
  z-index:999;
}

.dropdown-menu.show{
  display:block;
}

.user-menu{
  position:fixed;
  z-index:99999;
  width:240px;
  max-width:calc(100vw - 20px);
  overflow-wrap:anywhere;
  word-break:break-word;
}

/* ===== USER ===== */
.user{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  position:relative;
}

.avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  background:#6f42c1;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:20px;
  padding:20px;
  max-width:1100px;
  margin:auto;
  width:100%;
  min-width:0;
}

/* ===== CARD ===== */
.card{
  background:white;
  border-radius:16px;
  padding:22px;
  cursor:pointer;
  transition:0.25s;
  border:1px solid #e6e9f0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:8px;
}

@media (max-width: 600px){
  .dropdown-menu{
    right:10px;
    left:10px;
    max-width:calc(100vw - 20px);
  }
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card-icon{
  font-size:28px;
  color:#6f42c1;
}

.card-title{
  font-size:17px;
  font-weight:600;
}

.card-sub{
  font-size:13px;
  color:#777;
}

/* ===== STATUS ===== */
.status{
  margin-top:10px;
  padding:6px 12px;
  border-radius:20px;
  color:white;
  font-size:12px;
}

/* ===== SETTINGS ===== */
.settings{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
  padding:25px;
  max-width:1100px;
  margin:auto;
  width:100%;
  min-width:0;
}

.setting{
  background:white;
  border-radius:14px;
  padding:16px;
  border:1px solid #e4e7ee;
  display:flex;
  flex-direction:column;
  gap:10px;
  transition:0.2s;
}

.setting:hover{
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.setting label{
  font-size:13px;
  color:#666;
}

.setting select,
.setting input{
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
  font-family:'Cairo';
}

/* ===== BREADCRUMB ===== */
.breadcrumb{
  padding:15px 25px;
  font-size:14px;
}

.breadcrumb span{
  color:#6f42c1;
  cursor:pointer;
}

.breadcrumb span::after{
  content:"/";
  margin:0 5px;
  color:#aaa;
}

.breadcrumb span:last-child::after{
  content:"";
}

/* ===== LOADER ===== */
.loader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(4px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.loader.hidden{
  display:none;
}

.spinner{
  width:50px;
  height:50px;
  border:5px solid #ddd;
  border-top:5px solid #6f42c1;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* ===== TOAST ===== */
.toast{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#6f42c1;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  display:none;
}

/* ===== ANIMATION ===== */
.fade{
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}

/* ===== SCHOOLS MENU ===== */
.school-group{
  margin-bottom:8px;
}

.school-title{
  font-weight:600;
  margin-bottom:5px;
}

.lab-item{
  padding:6px;
  border-radius:6px;
  cursor:pointer;
}

.lab-item:hover{
  background:#f2f2f2;
}

/* ===== DASHBOARD ===== */
.dashboard{
  padding:20px;
  width:100%;
  max-width:1100px;
  margin:0 auto;
  min-width:0;
}

.dashboard-header h2{
  margin:0;
}

.dashboard-header p{
  color:#777;
  margin-top:5px;
}

.dashboard-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
  gap:15px;
  margin-top:20px;
}

.stat-card{
  background:white;
  border-radius:14px;
  padding:18px;
  display:flex;
  align-items:center;
  gap:15px;
  border:1px solid #e6e9f0;
}

.stat-card i{
  font-size:22px;
  color:#6f42c1;
}

.stat-title{
  font-size:13px;
  color:#777;
}

.stat-value{
  font-size:20px;
  font-weight:700;
}

.mode-section{
  margin-top:30px;
}

.mode-section h3{
  margin-bottom:10px;
}

.mode-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
  gap:12px;
  margin-top:15px;
}

.mode-card{
  padding:14px;
  border-radius:12px;
  color:white;
  font-weight:bold;
  text-align:center;
  font-size:14px;
  transition:0.2s;
}

.mode-card:hover{
  transform:scale(1.05);
}

.chart-card{
  background:white;
  border-radius:16px;
  padding:20px;
  border:1px solid #e6e9f0;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* ===== FOOTER ===== */
.footer{
  position:fixed;
  right:0;
  bottom:0;
  left:0;
  padding:20px;
  background:#ffffff;
  border-top:1px solid #e6e9f0;
  width:100%;
  z-index:90;
}

.footer-content{
  display:flex;
  justify-content:space-between;
  align-items:center;
  max-width:1100px;
  margin:auto;
  width:100%;
  font-size:13px;
  color:#666;
}

.footer-left{
  display:flex;
  gap:5px;
  align-items:center;
  direction:ltr;
}

.footer-center{
  font-weight:600;
  color:#6f42c1;
}

.footer-right i{
  font-size:16px;
  color:#6f42c1;
}

button{
  min-height:44px;
  padding:12px 16px;
  border-radius:10px;
  font-family:'Cairo', sans-serif;
  font-size:14px;
}

.dashboard-header{
  margin-bottom:20px;
}

.dashboard-header p{
  line-height:1.7;
}

.stat-card,
.chart-card,
.mode-card{
  width:100%;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  html{
    font-size:16px;
  }

  .navbar{
    padding:12px 16px;
    gap:12px;
    align-items:center;
  }

  .nav-left{
    min-width:0;
    gap:10px;
  }

  .nav-right{
    flex-shrink:0;
    min-width:0;
  }

  .logo{
    height:34px;
  }

  .app-title{
    min-width:0;
    max-width:140px;
  }

  .app-title .main{
    font-size:14px;
  }

  .app-title .sub{
    font-size:11px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .dashboard{
    padding:12px;
  }

  .grid,
  .settings,
  .dashboard-grid{
    grid-template-columns:1fr;
    gap:14px;
    padding:12px;
  }

  .dashboard-grid,
  .mode-grid,
  .grid,
  .settings{
    width:100%;
    max-width:100%;
  }

  .settings{
    padding-top:8px;
  }

  .mode-grid{
    grid-template-columns:1fr;
    gap:10px;
  }

  .card,
  .setting,
  .stat-card,
  .chart-card,
  .mode-card{
    width:100%;
    max-width:100%;
  }

  .card,
  .setting,
  .chart-card{
    padding:16px;
  }

  .setting select,
  .setting input,
  button{
    font-size:16px;
  }

  .stat-card{
    padding:16px;
    gap:12px;
  }

  .breadcrumb{
    padding:14px 16px;
    line-height:1.8;
    overflow-wrap:anywhere;
  }

  .menu{
    display:none;
    position:absolute;
    top:60px;
    right:10px;
    left:10px;
    background:white;
    border-radius:12px;
    padding:12px;
    flex-direction:column;
    gap:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    z-index:1000;
  }

  .menu.show{
    display:flex;
  }

  .menu-item{
    min-height:44px;
    padding:10px 12px;
    border-radius:10px;
    background:#f7f8fc;
  }

  .hamburger{
    display:block;
  }

  .user{
    gap:8px;
  }

  .avatar{
    width:34px;
    height:34px;
  }

  .dropdown-menu,
  .user-menu{
    width:auto;
    min-width:unset;
    max-width:calc(100vw - 20px);
  }

  #username{
    max-width:84px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .footer{
    padding:16px 12px;
  }

  #app{
    padding-bottom:120px;
  }

  .footer-content{
    flex-direction:column;
    gap:8px;
    text-align:center;
  }

  .footer-left{
    justify-content:center;
    flex-wrap:wrap;
  }

  .footer-center{
    font-size:12px;
  }
}

@media(min-width:768px) and (max-width:1024px){
  .grid{
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  }

  .settings{
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  }
}

@media(min-width:769px){
  .dashboard-grid{
    grid-template-columns:repeat(2, minmax(0, 1fr));
  }
}

</style>
